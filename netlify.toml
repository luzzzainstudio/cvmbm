[build]
  publish = "."
  command = ""

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[headers]
  [[headers.values]]
    key = "X-Content-Type-Options"
    value = "nosniff"
  [[headers.values]]
    key = "X-Frame-Options"
    value = "DENY"
  [[headers.values]]
    key = "X-XSS-Protection"
    value = "1; mode=block"
