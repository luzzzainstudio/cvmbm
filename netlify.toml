[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

# Redirect ini memastikan jika user mengakses URL seperti /tentang (tanpa #), 
# mereka tetap akan diarahkan ke index.html sehingga JS bisa menangani rutenya.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[headers]
  [[headers.values]]
    key = "X-Content-Type-Options"
    value = "nosniff"
  [[headers.values]]
    key = "X-Frame-Options"
    value = "DENY"
  [[headers.values]]
    key = "X-XSS-Protection"
    value = "1; mode=block"
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
